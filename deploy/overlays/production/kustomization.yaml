apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - flux-kustomization.yaml
  - gitrepository.yaml

images:
  - name: wackorder-bot
    newName: ghcr.io/barthv/wackorder-bot
    newTag: latest

patches:
  - target:
      kind: Deployment
      name: wackorder-bot
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always

configMapGenerator:
  - name: wackorder-bot
    behavior: merge
    literals:
      - LOG_LEVEL=info
      - LOG_CHANNEL_ID=1483550466942963954
      - ADMIN_ROLE_IDS=1483588423749996564
      - CORP_ID=1482661212977234113
