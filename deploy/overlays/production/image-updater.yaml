apiVersion: v1
kind: ServiceAccount
metadata:
  name: image-updater
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: image-updater
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
  - apiGroups: ["image.toolkit.fluxcd.io"]
    resources: ["imagepolicies"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: image-updater
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: image-updater
subjects:
  - kind: ServiceAccount
    name: image-updater
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: image-updater
spec:
  schedule: "*/2 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      activeDeadlineSeconds: 60
      template:
        spec:
          serviceAccountName: image-updater
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
          containers:
            - name: kubectl
              image: registry.k8s.io/kubectl:v1.35.3
              command:
                - /bin/sh
                - -ce
                - |
                  LATEST=$(kubectl get imagepolicy wackorder-bot -o jsonpath='{.status.latestImage}')
                  if [ -z "$LATEST" ]; then
                    echo "WARNING: no latestImage in ImagePolicy status"
                    exit 0
                  fi
                  CURRENT=$(kubectl get deployment wackorder-bot -o jsonpath='{.spec.template.spec.containers[0].image}')
                  if [ "$CURRENT" = "$LATEST" ]; then
                    echo "Image already up to date: $CURRENT"
                    exit 0
                  fi
                  echo "Updating image: $CURRENT -> $LATEST"
                  printf '{"apiVersion":"apps/v1","kind":"Deployment","metadata":{"name":"wackorder-bot"},"spec":{"template":{"spec":{"containers":[{"name":"wackorder-bot","image":"%s"}]}}}}' "$LATEST" \
                    | kubectl apply --server-side --force-conflicts --field-manager=image-updater -f -
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 64Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
