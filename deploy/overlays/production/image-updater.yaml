apiVersion: v1
kind: ServiceAccount
metadata:
  name: image-updater
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: image-updater
rules:
  - apiGroups: ["image.toolkit.fluxcd.io"]
    resources: ["imagepolicies"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: image-updater
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: image-updater
subjects:
  - kind: ServiceAccount
    name: image-updater
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wackorder-image-updater-configmap-writer
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["wackorder-image-vars"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wackorder-image-updater-configmap-writer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: wackorder-image-updater-configmap-writer
subjects:
  - kind: ServiceAccount
    name: image-updater
    namespace: wackorder
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: image-updater
spec:
  schedule: "*/5 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      activeDeadlineSeconds: 60
      backoffLimit: 0
      template:
        spec:
          serviceAccountName: image-updater
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
          containers:
            - name: updater
              image: alpine/k8s:1.35.2
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -ce
                - |
                  LATEST_TAG=$(kubectl get imagepolicy wackorder-bot -o jsonpath='{.status.latestRef.tag}')
                  if [ -z "$LATEST_TAG" ]; then
                    echo "WARNING: no latestRef in ImagePolicy status"
                    exit 1
                  fi
                  CURRENT=$(kubectl get configmap wackorder-image-vars -n flux-system -o jsonpath='{.data.WACKORDER_BOT_IMAGE_TAG}' 2>/dev/null || echo "")
                  if [ "$CURRENT" = "$LATEST_TAG" ]; then
                    echo "Tag already up to date: $LATEST_TAG"
                    exit 0
                  fi
                  echo "Updating image tag: $CURRENT -> $LATEST_TAG"
                  printf '{"apiVersion":"v1","kind":"ConfigMap","metadata":{"name":"wackorder-image-vars","namespace":"flux-system","labels":{"reconcile.fluxcd.io/watch":"Enabled"}},"data":{"WACKORDER_BOT_IMAGE_TAG":"%s"}}' "$LATEST_TAG" \
                    | kubectl apply --server-side -f -
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 64Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
