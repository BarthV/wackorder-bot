apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: wackorder-dev
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: wackorder
  path: ./deploy/overlays/dev
  prune: true
  targetNamespace: wackorder-dev
  postBuild:
    substitute:
      WACKORDER_BOT_IMAGE_TAG: set-by-autoupdater
    substituteFrom:
      - kind: ConfigMap
        name: wackorder-dev-image-vars
        optional: true
