apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: wackorder
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: wackorder
  path: ./deploy/overlays/production
  prune: true
  targetNamespace: wackorder
  postBuild:
    substitute:
      WACKORDER_BOT_IMAGE_TAG: set-by-autoupdater
    substituteFrom:
      - kind: ConfigMap
        name: wackorder-image-vars
        optional: true
