apiVersion: v1
kind: ServiceAccount
metadata:
  name: image-updater
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: image-updater
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: image-updater
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: image-updater
subjects:
  - kind: ServiceAccount
    name: image-updater
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wackorder-image-updater-gitrepository-reader
rules:
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources: ["gitrepositories"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wackorder-image-updater-gitrepository-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: wackorder-image-updater-gitrepository-reader
subjects:
  - kind: ServiceAccount
    name: image-updater
    namespace: wackorder
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: image-updater
spec:
  schedule: "*/5 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      activeDeadlineSeconds: 60
      backoffLimit: 0
      template:
        spec:
          serviceAccountName: image-updater
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
          containers:
            - name: updater
              image: alpine/k8s:1.35.2
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -ce
                - |
                  REVISION=$(kubectl get gitrepository wackorder -n flux-system -o jsonpath='{.status.artifact.revision}')
                  if [ -z "$REVISION" ]; then
                    echo "WARNING: no revision in GitRepository status"
                    exit 1
                  fi
                  SHA=$(echo "$REVISION" | sed 's/.*sha1://')
                  LATEST="ghcr.io/barthv/wackorder-bot:$SHA"
                  CURRENT=$(kubectl get deployment wackorder-bot -o jsonpath='{.spec.template.spec.containers[0].image}')
                  if [ "$CURRENT" = "$LATEST" ]; then
                    echo "Image already up to date: $CURRENT"
                    exit 0
                  fi
                  echo "Updating image: $CURRENT -> $LATEST"
                  printf '{"apiVersion":"apps/v1","kind":"Deployment","metadata":{"name":"wackorder-bot"},"spec":{"template":{"metadata":{"annotations":{"deploy.flux.cd/revision":"%s"}},"spec":{"containers":[{"name":"wackorder-bot","image":"%s"}]}}}}' "$SHA" "$LATEST" \
                    | kubectl apply --server-side --force-conflicts --field-manager=image-updater -f -
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 64Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
