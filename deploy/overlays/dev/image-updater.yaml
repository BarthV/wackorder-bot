apiVersion: v1
kind: ServiceAccount
metadata:
  name: image-updater-dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wackorder-image-updater-dev-gitrepository-reader
rules:
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources: ["gitrepositories"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wackorder-image-updater-dev-gitrepository-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: wackorder-image-updater-dev-gitrepository-reader
subjects:
  - kind: ServiceAccount
    name: image-updater-dev
    namespace: wackorder-dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wackorder-image-updater-dev-configmap-writer
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["wackorder-dev-image-vars"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wackorder-image-updater-dev-configmap-writer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: wackorder-image-updater-dev-configmap-writer
subjects:
  - kind: ServiceAccount
    name: image-updater-dev
    namespace: wackorder-dev
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: image-updater-dev
spec:
  schedule: "*/5 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      activeDeadlineSeconds: 60
      backoffLimit: 0
      template:
        spec:
          serviceAccountName: image-updater-dev
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
          containers:
            - name: updater
              image: alpine/k8s:1.35.2
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -ce
                - |
                  READY=$(kubectl get gitrepository wackorder -n flux-system -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}')
                  if [ "$READY" != "True" ]; then
                    echo "ERROR: GitRepository wackorder is not ready (Ready=$READY)"
                    exit 1
                  fi
                  REVISION=$(kubectl get gitrepository wackorder -n flux-system -o jsonpath='{.status.artifact.revision}')
                  if [ -z "$REVISION" ]; then
                    echo "WARNING: no revision in GitRepository status"
                    exit 1
                  fi
                  SHA=$(echo "$REVISION" | sed 's/.*sha1://')
                  CURRENT=$(kubectl get configmap wackorder-dev-image-vars -n flux-system -o jsonpath='{.data.WACKORDER_BOT_IMAGE_TAG}' 2>/dev/null || echo "")
                  if [ "$CURRENT" = "$SHA" ]; then
                    echo "Tag already up to date: $SHA"
                    exit 0
                  fi
                  echo "Updating image tag: $CURRENT -> $SHA"
                  kubectl create configmap wackorder-dev-image-vars \
                    --namespace=flux-system \
                    --from-literal=WACKORDER_BOT_IMAGE_TAG="$SHA" \
                    --dry-run=client -o yaml | kubectl apply -f -
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 64Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
